<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        /* Убираем отступы и делаем кнопку на весь экран 
        body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* Скрывает полосы прокрутки */
        position: fixed;  /* Жестко фиксирует положение контента */
        width: 100%;
        touch-action: none; /* Отключает жесты (зум, скролл пальцем) на мобильных */
        }
        .fullscreen-btn {
            width: 100vw;
            height: 100vh;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>

    <button class="fullscreen-btn" onclick="playMusic()">Нажми</button>
    
    <audio id="myAudio" src="output.mp3"></audio>

    <script>
        function playMusic() {
            const audio = document.getElementById('myAudio');
            audio.play();
        }
    </script>

</body>
</html>
